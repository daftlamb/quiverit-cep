<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>Quiver It</h1>
<div id="status">Internal vector trace tool</div>

<div class="section">
  <div class="section-title">Image Trace</div>
  <input type="file" id="img-file" accept="image/*" style="display:none">
  <button class="btn btn-sec" id="btn-pick-img">Choose Image</button>
  <div class="preview-box" id="img-preview">
    <span class="preview-placeholder">No image selected</span>
  </div>
  <div class="hint">QuiverIt API will trace the selected image into SVG paths.</div>
</div>

<div class="section">
  <div class="section-title">Vectorize</div>
  <div class="row">
    <label>Model</label>
    <select id="vec-model">
      <option value="arrow-1.1">Arrow 1.1</option>
      <option value="arrow-1.1-max">Arrow 1.1 Max</option>
      <option value="arrow-1.0">Arrow 1.0</option>
    </select>
  </div>
  <button class="btn" id="btn-vectorize">Trace with QuiverIt</button>
  <button class="btn btn-sec" id="btn-insert" disabled>Insert into Illustrator</button>
  <div class="preview-box" id="svg-preview">
    <span class="preview-placeholder">SVG preview appears here</span>
  </div>
</div>

<div class="section">
  <div class="section-title">API</div>
  <div class="api-row">
    <input type="password" id="api-key" placeholder="qvr-...">
    <button id="btn-save-key">Save</button>
  </div>
  <button class="btn btn-sec" id="btn-clear-key">Clear Saved Key</button>
  <div class="hint" id="credits-display">Save an internal API key before tracing.</div>
</div>

<div class="hint">Internal use only. This panel spends QuiverIt API credits.</div>

<script src="js/csinterface.js"></script>
<script src="js/main.js"></script>
</body>
</html>
